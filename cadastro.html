<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>
    <link rel="stylesheet" href="esil.css">
</head>
<body>

    <main class="container">
        <h1 class="titulo-pagina">Criar Conta</h1>

        <div class="cartao-formulario">
            <form action="#" method="POST">
                
                <div class="linha-dupla">
                    <div class="grupo-campo">
                        <label for="nome">Nome *</label>
                        <div class="input-icone">
                            <span class="icone">👤</span>
                            <input type="text" id="nome" placeholder="Ana" required>
                        </div>
                    </div>
                    <div class="grupo-campo">
                        <label for="sobrenome">Sobrenome *</label>
                        <div class="input-icone">
                            <span class="icone">👤</span>
                            <input type="text" id="sobrenome" placeholder="Carolina" required>
                        </div>
                    </div>
                </div>

                <div class="grupo-campo">
                    <label for="email">E-mail *</label>
                    <div class="input-icone">
                        <span class="icone">✉️</span>
                        <input type="email" id="email" placeholder="ana@email.com" required>
                    </div>
                </div>

                <div class="linha-dupla">
                    <div class="grupo-campo">
                        <label for="telefone">Telefone *</label>
                        <div class="input-icone">
                            <span class="icone">📞</span>
                            <input type="tel" id="telefone" placeholder="(11) 99999-0000" required>
                        </div>
                    </div>
                    <div class="grupo-campo">
                        <label for="nascimento">Data de Nascimento</label>
                        <div class="input-icone">
                            <input type="date" id="nascimento">
                        </div>
                    </div>
                </div>

                <div class="grupo-campo">
                    <label for="senha">Senha *</label>
                    <div class="input-icone">
                        <span class="icone">🔒</span>
                        <input type="password" id="senha" placeholder="Mínimo 8 caracteres" required>
                        <span class="icone-olho">👁️</span>
                    </div>
                </div>

                <div class="grupo-campo">
                    <label for="confirmar-senha">Confirmar Senha *</label>
                    <div class="input-icone">
                        <span class="icone">🔒</span>
                        <input type="password" id="confirmar-senha" placeholder="Repita a senha" required>
                        <span class="icone-olho">👁️</span>
                    </div>
                </div>

                <div class="grupo-selecao">
                    <label class="opcao-checkbox">
                        <input type="checkbox" checked>
                        <span>Quero receber novidades e ofertas exclusivas por e-mail</span>
                    </label>
                    <label class="opcao-checkbox">
                        <input type="checkbox" required>
                        <span>Li e aceito os Termos de Uso e a Política de Privacidade *</span>
                    </label>
                </div>

                <button type="submit" class="botao-enviar">Criar Conta Grátis</button>

                <p class="texto-login">Já tem uma conta? <a href="#">Fazer login</a></p>

            </form>
        </div>

        <div class="banner-oferta">
            <p>CRIE SUA CONTA JÁ E GARANTA 20% OFF EM TODOS OS PRODUTOS</p>
        </div>
    </main>

</body>
</html>
